
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polyhedron Preview</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">

  <div class="logo-container">
    <img src="assets/Polyhedron_Logo_Main.png"
         alt="Polyhedron Logo"
         class="site-logo">
  </div>

  <nav class="main-nav">
    <a href="#">Decks</a>
    <a href="#">Simulation</a>
    <a href="#">Framework</a>
  </nav>

  <div class="hero-container">
    <img src="assets/Polyhedron_Hero_Banner.jpg"
         alt="Hero Banner"
         class="hero-banner">
  </div>

</header>

<main class="content">

  <div class="tier-buttons">
    <button class="tier beginner">Beginner</button>
    <button class="tier advanced">Advanced</button>
    <button class="tier expert">Expert</button>
  </div>

  <div class="deck-columns">
    <div id="colBeginner" class="deck-column"></div>
    <div id="colAdvanced" class="deck-column"></div>
    <div id="colExpert" class="deck-column"></div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill"></div>
    <span class="progress-text">Progress: 0 / 64 unlocked</span>
  </div>

</main>

<script src="app.js"></script>
</body>
</html>
