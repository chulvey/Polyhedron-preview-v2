<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Polyhedron Preconstructed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Logo -->
  <div class="logo-container">
    <img src="PolyhedronLogo_Main.png" class="site-logo" alt="Polyhedron Gamestore">
  </div>

  <!-- Hero Banner -->
  <div class="hero-container">
    <img src="PolyhedronPrecon_HeroBanner.jpg" class="hero-banner" alt="Commander Hero Banner">
  </div>

  <!-- Navigation -->
  <nav class="nav">
    <a href="#">Decks</a>
    <a href="#">Simulation</a>
    <a href="#">Framework</a>
  </nav>

  <!-- Deck Grid Container -->
  <div id="deck-grid"></div>

  <!-- Progress Bar -->
  <div class="progress-wrapper">
    <div class="progress-bar">
      <div class="progress-fill"></div>
      <span class="progress-text">Progress: 4 / 64 unlocked</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
