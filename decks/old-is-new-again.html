<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Old is New Again</title>
<style>
:root{
  --lime:#c7ff5e;
  --text:#ffffff;
  --panel:rgba(0,0,0,0.58);
  --border:rgba(199,255,94,0.18);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  color:var(--text);
  background:#000;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("../Polyhedron_Background_Texture.png") center/cover no-repeat;
  opacity:0.10;
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("../PolyhedronLogo_Main.png") center/70vmin no-repeat;
  opacity:0.12;
  z-index:-1;
}

.logo{
  position:fixed;
  top:20px;
  left:20px;
  width:58px;
  z-index:20;
}

.page{
  max-width:980px;
  margin:0 auto;
  padding:92px 20px 80px;
}

.hero{
  position:relative;
  margin-top:18px;
  margin-bottom:110px;
}

.heroFrame{
  border:1px solid rgba(255,255,255,0.20);
  border-radius:20px;
  overflow:hidden;
  background:#050505;
  box-shadow:0 0 30px rgba(199,255,94,0.08);
}

.heroImage{
  display:block;
  width:100%;
  height:300px;
  object-fit:cover;
}

.violators{
  position:absolute;
  left:28px;
  right:28px;
  bottom:-80px; /* LOWERED ~50% more */
  display:flex;
  gap:22px;
  z-index:5;
}

.violator{
  width:160px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  padding:10px;
  backdrop-filter: blur(4px);
}

.violator img{
  width:100%;
  border-radius:10px;
}

.title{
  color:var(--lime);
  font-size:36px;
  margin:12px 0 20px;
  font-weight:800;
}

.meta p{
  font-size:18px;
  margin:0 0 10px;
}

.sectionTitle{
  color:var(--lime);
  font-size:22px;
  margin-top:38px;
  border-bottom:1px solid #444;
  padding-bottom:6px;
}

p{
  font-size:18px;
  line-height:1.7;
}

@media (max-width:700px){
  .hero{
    margin-bottom:100px;
  }
  .heroImage{
    height:220px;
  }
  .violators{
    bottom:-65px; /* also lowered */
    gap:14px;
  }
  .violator{
    width:calc(50% - 7px);
  }
}
</style>
</head>
<body>

<img class="logo" src="../polyhedron_logo_small.png">

<div class="page">

  <div class="hero">
    <div class="heroFrame">
      <img class="heroImage" src="../assets/Commander_Banners/old-is-new-again-banner.png">
    </div>

    <div class="violators">
      <div class="violator">
        <img src="https://cards.scryfall.io/normal/front/4/6/46446909-ea30-4db3-a896-ffe6f1d42668.jpg">
      </div>
      <div class="violator">
        <img src="../assets/exploit/exploit-combo.png">
      </div>
    </div>
  </div>

  <h1 class="title">Old is New Again</h1>

  <div class="meta">
    <p><strong>Commander:</strong> Teshar, Ancestor's Apostle</p>
    <p><strong>Tier:</strong> beginner</p>
  </div>

  <p>
    Flying. Whenever you cast a historic spell, return target creature card with mana value 3 or less
    from your graveyard to the battlefield.
  </p>

</div>

</body>
</html>
