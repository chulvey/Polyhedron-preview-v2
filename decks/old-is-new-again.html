
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Old is New Again | Polyhedron Deck</title>
<style>
body{
background-image:url("../Polyhedron_Background.png");
background-size:cover;
background-attachment:fixed;
background-position:center;
background:#0b0b0b;
color:#e6e6e6;
font-family:Arial, Helvetica, sans-serif;
margin:0;
}
.hero{height:280px;background:#111;border-bottom:2px solid #d6ff4d;}

.header{display:flex;gap:30px;flex-wrap:wrap;}
.card{width:260px;border-radius:6px;}
h1{color:#d6ff4d;margin-top:0;font-size:36px;}
.meta{margin-bottom:10px;font-size:18px;}
.section{margin-top:36px;}
.section h2{color:#d6ff4d;border-bottom:1px solid #333;padding-bottom:6px;}
.triangle{text-align:center;margin-top:40px;}
.triangle img{width:300px;}
</style>
</head>
<body>

<div class="hero"></div>

<div class="container">

<div class="header">

<img id="cardImage" class="card">

<div>

<h1>Old is New Again</h1>

<div class="meta">Commander: Teshar, Ancestor's Apostle</div>
<div class="meta">Tier: beginner</div>

<div id="oracle"></div>

</div>
</div>

<div class="section">
<h2>Introduction</h2>
<p>Add primer content here.</p>
</div>

<div class="section">
<h2>Why Play This Deck?</h2>
<p>Add strategic overview.</p>
</div>

<div class="section">
<h2>Posture</h2>
<p>Explain how this deck fits the exploit triangle.</p>
</div>

<div class="triangle">
<h2>Exploit Triangle</h2>
<img src="../assets/exploit/exploit-combo.png">
</div>

</div>

<script>
fetch("https://api.scryfall.com/cards/named?exact=Teshar%2C%20Ancestor%27s%20Apostle")
.then(res=>res.json())
.then(card=>{
document.getElementById("cardImage").src = card.image_uris.normal
document.getElementById("oracle").textContent = card.oracle_text
})
</script>

</body>
</html>
