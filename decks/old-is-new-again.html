
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Old is New Again | Polyhedron Deck</title>
<style>
body{
background: #0b0b0b;
      background-image: url('../Polyhedron_Background.png'), url('Polyhedron_Background.png');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      
color:#e6e6e6;
font-family:Arial, Helvetica, sans-serif;
margin:0;
}
.hero { height: 280px; border-bottom: 1px solid #2a2a2a; position: relative;
      background-image: url('../PolyhedronPrecon_Hero.png'), url('PolyhedronPrecon_Hero.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
.container { position: relative; z-index: 1; max-width:1000px;margin:auto;padding:40px 24px;}
.header{display:flex;gap:30px;flex-wrap:wrap;}
.card{width:260px;border-radius:6px;}
h1{color:#d6ff4d;margin-top:0;font-size:36px;}
.meta{margin-bottom:10px;font-size:18px;}
.section{margin-top:36px;}
.section h2{color:#d6ff4d;border-bottom:1px solid #333;padding-bottom:6px;}
.triangle{text-align:center;margin-top:40px;}
.triangle img{width:300px;}

    .watermark {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 0;
      opacity: 0.10;
      filter: grayscale(100%);
    }
    .watermark img {
      width: min(80vw, 700px);
      max-width: 700px;
      height: auto;
    }
    .corner-logo {
      position: absolute;
      top: 14px;
      left: 14px;
      width: 88px;
      height: auto;
      opacity: 0.85;
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.7));
    }
  </style>
</head>
<body>
  <div class="watermark"><img src="../PolyhedronLogo_Main.png" alt="Polyhedron" onerror="this.onerror=null;this.src='PolyhedronLogo_Main.png';"></div>


<div class="hero"><img class="corner-logo" src="../PolyhedronLogo_Main.png" alt="Polyhedron" onerror="this.onerror=null;this.src='PolyhedronLogo_Main.png';"></div>

<div class="container">

<div class="header">

<img id="cardImage" class="card">

<div>

<h1>Old is New Again</h1>

<div class="meta">Commander: Teshar, Ancestor's Apostle</div>
<div class="meta">Tier: beginner</div>

<div id="oracle"></div>

</div>
</div>

<div class="section">
<h2>Introduction</h2>
<p>Add primer content here.</p>
</div>

<div class="section">
<h2>Why Play This Deck?</h2>
<p>Add strategic overview.</p>
</div>

<div class="section">
<h2>Posture</h2>
<p>Explain how this deck fits the exploit triangle.</p>
</div>

<div class="triangle">
<h2>Exploit Triangle</h2>
<img src="../assets/exploit/exploit-combo.png">
</div>

</div>

<script>
fetch("https://api.scryfall.com/cards/named?exact=Teshar%2C%20Ancestor%27s%20Apostle")
.then(res=>res.json())
.then(card=>{
document.getElementById("cardImage").src = card.image_uris.normal
document.getElementById("oracle").textContent = card.oracle_text
})
</script>

</body>
</html>
