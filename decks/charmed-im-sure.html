<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charmed, Im Sure</title>
<style>
:root{
  --lime:#c7ff5e;
  --text:#ffffff;
  --panel:rgba(0,0,0,0.58);
  --border:rgba(199,255,94,0.18);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  color:var(--text);
  background:#000;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("../Polyhedron_Background_Texture.png") center/cover no-repeat;
  opacity:0.10;
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url("../PolyhedronLogo_Main.png") center/70vmin no-repeat;
  opacity:0.12;
  z-index:-1;
}

.logo{
  position:fixed;
  top:8px;
  left:8px;
  width:64px;
  z-index:20;
}

.chibi{
  position:fixed;
  right:8px;
  bottom:8px;
  width:64px;
  height:192px;
  z-index:20;
  background:transparent;
  border:none;
  box-shadow:none;
}

.chibi img{
  display:block;
  width:100%;
  height:100%;
  object-fit:contain;
}

.page{
  max-width:980px;
  margin:0 auto;
  padding:0 20px 80px;
}

.hero{
  position:relative;
  margin-top:0;
  margin-bottom:0;
}

.heroFrame{
  border:1px solid rgba(255,255,255,0.20);
  border-radius:20px;
  overflow:hidden;
  background:#050505;
  box-shadow:0 0 30px rgba(199,255,94,0.08);
}

.heroImage{
  display:block;
  width:100%;
  height:300px;
  object-fit:cover;
  object-position:center;
}

.violatorRow{
  display:flex;
  gap:22px;
  padding:0 28px;
  margin-top:-32px;
  margin-bottom:24px;
  position:relative;
  z-index:5;
}

.violator{
  width:160px;
  background:transparent;
  border:1px solid var(--border);
  border-radius:18px;
  padding:10px;
  backdrop-filter:none;
}

.exploit{
  border:none !important;
  box-shadow:none !important;
}

.violator img{
  display:block;
  width:100%;
  height:auto;
  border-radius:10px;
}

.title{
  color:var(--lime);
  font-size:36px;
  margin:12px 0 20px;
  font-weight:800;
}

.meta p{
  font-size:18px;
  margin:0 0 10px;
}

.sectionTitle{
  color:var(--lime);
  font-size:22px;
  margin-top:38px;
  border-bottom:1px solid #444;
  padding-bottom:6px;
}

p{
  font-size:18px;
  line-height:1.7;
}

.dynamicContent{
  white-space:pre-line;
}

@media (max-width:700px){
  .page{ padding:0 16px 64px; }
  .hero{ margin-bottom:0; }
  .heroImage{ height:220px; }
  .violatorRow{ gap:14px; padding:0 14px; margin-top:-24px; margin-bottom:20px; }
  .violator{ width:calc(50% - 7px); padding:8px; }
  .title{ font-size:30px; margin-top:14px; }
  .meta p, p{ font-size:17px; }
}
</style>
</head>
<body>

<img class="logo" src="../PolyhedronLogo_Main.png" alt="Polyhedron logo">
<div class="chibi"><img src="../assets/chibis/charmed-im-sure.png" alt="Charmed, Im Sure chibi avatar"></div>

<div class="page">

  <div class="hero">
    <div class="heroFrame">
      <img class="heroImage" src="../assets/Commander_Banners/charmed-im-sure-banner.png" alt="Charmed, Im Sure banner art">
    </div>
  </div>

  <div class="violatorRow">
    <div class="violator">
      <img src="https://api.scryfall.com/cards/named?exact=Sythis%2C%20Harvest%27s%20Hand&format=image" alt="Sythis, Harvest&#x27;s Hand">
    </div>
    <div class="violator">
      <img src="../assets/exploit/exploit-control.png" alt="Exploit Triangle">
    </div>
  </div>

  <h1 class="title">Charmed, Im Sure</h1>

  <div class="meta">
    <p><strong>Commander:</strong> Sythis, Harvest&#x27;s Hand</p>
    <p><strong>Tier:</strong> advanced</p>
  </div>

  <p id="commander-rules">Loading commander rules text...</p>

  <div class="sectionTitle">Introduction</div>
  <p id="introduction-content" class="dynamicContent">Add primer content here.</p>

  <div class="sectionTitle">Why Play This Deck?</div>
  <p id="why-play-content" class="dynamicContent">Add strategic overview.</p>

  <div class="sectionTitle">Posture</div>
  <p id="posture-content" class="dynamicContent">Explain how this deck fits the exploit triangle.</p>

</div>

<script>
(function(){
  const DATA_PATH = "../data/deck-content.json";
  const slug = window.location.pathname.split("/").pop().replace(/\.html$/i, "");
  const commanderName = "Sythis, Harvest's Hand";

  const targets = {
    introduction: document.getElementById("introduction-content"),
    why_play: document.getElementById("why-play-content"),
    posture: document.getElementById("posture-content")
  };

  fetch(DATA_PATH)
    .then(function(response){
      if(!response.ok){
        throw new Error("Failed to load deck content JSON");
      }
      return response.json();
    })
    .then(function(data){
      const deck = data[slug];
      if(!deck || !deck.sections){
        return;
      }

      Object.keys(targets).forEach(function(sectionKey){
        const target = targets[sectionKey];
        const section = deck.sections[sectionKey];
        if(target && section && section.body_text){
          target.textContent = section.body_text;
        }
      });
    })
    .catch(function(error){
      console.error(error);
    });

  fetch("https://api.scryfall.com/cards/named?exact=" + encodeURIComponent(commanderName))
    .then(function(response){
      if(!response.ok){
        throw new Error("Failed to load commander data");
      }
      return response.json();
    })
    .then(function(card){
      const rulesTarget = document.getElementById("commander-rules");
      let oracle = "";
      if(card.oracle_text){
        oracle = card.oracle_text;
      } else if(card.card_faces && card.card_faces.length){
        oracle = card.card_faces.map(function(face){
          return face.name + "\n" + (face.oracle_text || "");
        }).join("\n\n");
      }
      if(card.power !== undefined && card.toughness !== undefined && card.power !== null && card.toughness !== null){
        oracle += (oracle ? "\n" : "") + card.power + "/" + card.toughness;
      }
      if(rulesTarget && oracle){
        rulesTarget.textContent = oracle;
        rulesTarget.classList.add("dynamicContent");
      } else if(rulesTarget) {
        rulesTarget.textContent = "See commander card image above for gameplay reference.";
      }
    })
    .catch(function(error){
      console.error(error);
      const rulesTarget = document.getElementById("commander-rules");
      if(rulesTarget){
        rulesTarget.textContent = "See commander card image above for gameplay reference.";
      }
    });
})();
</script>

</body>
</html>
